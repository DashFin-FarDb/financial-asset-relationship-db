version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: financial-asset-backend-debug
    ports:
      - "7860:7860"
      - "8000:8000"
      - "5678:5678"
    environment:
      - GRADIO_SERVER_NAME=0.0.0.0
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=postgresql://finuser:changeme@postgres:5432/financial_assets
    volumes:
      - .:/app
      - /app/__pycache__
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app-network
    command: python -m debugpy.adapter --listen 0.0.0.0:5678 --log-dir /tmp -m app.py

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: financial_assets
      POSTGRES_USER: finuser
      POSTGRES_PASSWORD: changeme
    volumes:
      - postgres_data_debug:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finuser"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  postgres_data_debug:
    driver: local

networks:
  app-network:
    driver: bridge
