version: 2.1

orbs:
  orb-tools: circleci/orb-tools@12.3
  node: circleci/node@5.1.0
  python: circleci/python@2.1.1
  codecov: codecov/codecov@4.0.1

executors:
  python-executor:
    docker:
      - image: cimg/python:3.11
    working_directory: ~/project
    resource_class: medium

  node-executor:
    docker:
      - image: cimg/node:18.19
    working_directory: ~/project
    resource_class: medium

jobs:
  # Python Backend Jobs
  python-lint:
    executor: python-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - python-deps-v2-{{ checksum "requirements.txt" }}-{{ checksum "requirements-dev.txt" }}
            - python-deps-v2-{{ checksum "requirements.txt" }}
            - python-deps-v2-
      - run:
          name: Install dependencies
          command: |
            pip install --upgrade pip
            pip install -r requirements.txt
            if [ -f requirements-dev.txt ]; then
              pip install -r requirements-dev.txt
            fi
      - save_cache:
          key: python-deps-v2-{{ checksum "requirements.txt" }}-{{ checksum "requirements-dev.txt" }}
          paths:
            - ~/.cache/pip
            - /home/circleci/.local/lib/python3.11/site-packages
      - run:
          name: Run flake8 (critical errors only)
          command: |
            flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics --config=.flake8

  python-test:
    executor: python-executor
    parallelism: 4
    steps:
      - checkout
      - restore_cache:
          keys:
            - python-deps-v2-{{ checksum "requirements.txt" }}-{{ checksum "requirements-dev.txt" }}
            - python-deps-v2-{{ checksum "requirements.txt" }}
            - python-deps-v2-
      - run:
          name: Install dependencies
          command: |
            pip install --upgrade pip
            pip install -r requirements.txt
            if [ -f requirements-dev.txt ]; then
              pip install -r requirements-dev.txt
            fi
      - save_cache:
          key: python-deps-v2-{{ checksum "requirements.txt" }}-{{ checksum "requirements-dev.txt" }}
          paths:
            - ~/.cache/pip
            - /home/circleci/.local/lib/python3.11/site-packages
      - run:
          name: Run tests with pytest
          command: |
            TESTFILES=$(circleci tests glob "tests/**/*.py" | circleci tests split --split-by=timings)
            pytest "$TESTFILES" --cov=src --cov=tests --cov-report=xml --cov-report=html --cov-report=term-missing -v --junitxml=test-results/pytest/results.xml
      - codecov/upload:
          file: coverage.xml
      - store_test_results:
          path: test-results
      - store_artifacts:
          path: htmlcov
          destination: coverage-report

  python-security:
    executor: python-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - python-security-deps-v2-{{ checksum "requirements.txt" }}
            - python-security-deps-v2-
      - run:
          name: Install dependencies
          command: |
            pip install --upgrade pip
            pip install -r requirements.txt
            pip install safety bandit
      - save_cache:
          key: python-security-deps-v2-{{ checksum "requirements.txt" }}
          paths:
            - ~/.cache/pip
            - /home/circleci/.local/lib/python3.11/site-packages
      - run:
          name: Security check with safety
          command: safety check --json --ignore 72086
      - run:
          name: Security check with bandit
          command: bandit -r src/ -ll -f json -o bandit-report.json
      - store_artifacts:
          path: bandit-report.json
          destination: security-reports

  # Frontend Jobs
  frontend-lint:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - node-deps-v2-{{ checksum "frontend/package-lock.json" }}-{{ checksum "frontend/package.json" }}
            - node-deps-v2-{{ checksum "frontend/package.json" }}
            - node-deps-v2-
      - run:
          name: Install dependencies
          command: |
            cd frontend
            if [ -f package-lock.json ]; then
              npm ci --prefer-offline --no-audit
            else
              echo "package-lock.json not found; running npm install instead"
              npm install
            fi
      - save_cache:
          key: node-deps-v2-{{ checksum "frontend/package-lock.json" }}-{{ checksum "frontend/package.json" }}
          paths:
            - frontend/node_modules
            - ~/.npm
      - run:
          name: Run ESLint
          command: |
            cd frontend && npm run lint --if-present

  frontend-build:
    executor: node-executor
    steps:
      - checkout
      - restore_cache:
          keys:
            - node-deps-v2-{{ checksum "frontend/package-lock.json" }}-{{ checksum "frontend/package.json" }}
            - node-deps-v2-{{ checksum "frontend/package.json" }}
            - node-deps-v2-
      - run:
          name: Install dependencies
          command: |
            cd frontend
            if [ -f package-lock.json ]; then
              npm ci --prefer-offline --no-audit
            else
              echo "package-lock.json not found; running npm install instead"
              npm install
            fi
      - save_cache:
          key: node-deps-v2-{{ checksum "frontend/package-lock.json" }}-{{ checksum "frontend/package.json" }}
          paths:
            - frontend/node_modules
            - ~/.npm
      - restore_cache:
          keys:
            - nextjs-build-cache-v1-{{ .Branch }}-{{ .Revision }}
            - nextjs-build-cache-v1-{{ .Branch }}-
            - nextjs-build-cache-v1-
      - run:
          name: Build Next.js application
          command: |
            cd frontend && npm run build --if-present
      - save_cache:
          key: nextjs-build-cache-v1-{{ .Branch }}-{{ .Revision }}
          paths:
            - frontend/.next/cache
      - store_artifacts:
          path: frontend/.next
          destination: next-build

  # Docker Build Job
  docker-build:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - setup_remote_docker:
          docker_layer_caching: true
      - run:
          name: Build Docker image
          command: |
            docker build -t financial-asset-relationship-db:${CIRCLE_SHA1} .
      - run:
          name: Test Docker image
          command: |
            docker run --rm financial-asset-relationship-db:${CIRCLE_SHA1} python --version

workflows:
  version: 2
  build-and-test:
    jobs:
      # Backend workflow - run lint and test in parallel, security can run after lint
      - python-lint
      - python-test
      - python-security:
          requires:
            - python-lint

      # Frontend workflow - run lint and build in parallel
      - frontend-lint
      - frontend-build

      # Docker build (only on main branch) - wait for tests to pass
      - docker-build:
          requires:
            - python-lint
            - python-test
            - python-security
            - frontend-lint
            - frontend-build
          filters:
            branches:
              only:
                - main
                - develop

  # Nightly security scan
  nightly-security:
    triggers:
      - schedule:
          cron: "0 2 * * *"
          filters:
            branches:
              only:
                - main
    jobs:
      - python-security
