# Labeler configuration for actions/labeler@v6
# See: https://github.com/actions/labeler

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - 'docs/**'

ci:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/**'

python:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.py'

javascript:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.js'
      - '**/*.ts'
      - '**/*.jsx'
      - '**/*.tsx'

docker:
  - changed-files:
    - any-glob-to-any-file:
      - '**/Dockerfile*'
      - '**/*.dockerfile'
      - 'docker-compose*.yml'
