# Labeler configuration
# See: https://github.com/actions/labeler

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - 'docs/**'

ci:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/**'

tests:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.test.*'
      - '**/*.spec.*'
      - 'tests/**'
      - 'test/**'

dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - 'package.json'
      - 'package-lock.json'
      - 'yarn.lock'
      - 'requirements*.txt'
      - 'Pipfile'
      - 'Pipfile.lock'
      - 'go.mod'
      - 'go.sum'
      - 'pom.xml'
      - 'build.gradle'
