# Labeler configuration for actions/labeler@v6
# See: https://github.com/actions/labeler

documentation:
  - changed-files:
    - any-glob-to-any-file:
      - '**/*.md'
      - 'docs/**'

github-actions:
  - changed-files:
    - any-glob-to-any-file:
      - '.github/**'

dependencies:
  - changed-files:
    - any-glob-to-any-file:
      - 'package.json'
      - 'package-lock.json'
      - 'yarn.lock'
      - 'requirements*.txt'
      - 'Pipfile'
      - 'Pipfile.lock'
      - 'go.mod'
      - 'go.sum'
      - 'pom.xml'
      - 'build.gradle'
      - 'Gemfile'
      - 'Gemfile.lock'
