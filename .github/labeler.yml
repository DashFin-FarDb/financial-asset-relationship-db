# Labeler configuration
# See: https://github.com/actions/labeler

documentation:
  - changed-files:
    - any-glob-to-any-file: ['**/*.md', 'docs/**']

dependencies:
  - changed-files:
    - any-glob-to-any-file: ['pyproject.toml', 'requirements*.txt', 'package.json', 'package-lock.json']

ci:
  - changed-files:
    - any-glob-to-any-file: ['.github/**']

python:
  - changed-files:
    - any-glob-to-any-file: ['**/*.py']

docker:
  - changed-files:
    - any-glob-to-any-file: ['Dockerfile', 'docker-compose.yml', '.dockerignore']

tests:
  - changed-files:
    - any-glob-to-any-file: ['tests/**', 'conftest.py']
