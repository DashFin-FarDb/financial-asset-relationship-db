name: "Setup JFrog CLI OIDC Example"
"on": push

permissions:
  # This is required for requesting the OIDC token
  id-token: write
  # This is required for actions/checkout
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    # Only run if JF_URL is configured
    if: vars.JF_URL != ''
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@5a4fbe1e30dbb570cc62d2513421c4b9bc3c9959 # v4
        env:
          JF_URL: ${{ vars.JF_URL }}
        with:
          oidc-provider-name: mohavro/financial-asset-relationship-db@github

      - name: Run JFrog CLI
        run: |
          # Ping the server
          jf rt ping
