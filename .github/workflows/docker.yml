name: Docker Build and Test

"on":
  push:
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
      - '**/Dockerfile'
      - '**/Dockerfile.*'
      - '**/*.dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
      - '**/docker-compose*.yml'
      - 'compose.yml'
      - 'compose.yaml'
      - 'docker/**'
      - '.github/workflows/docker.yml'
      - '!**/*.md'
      - '!docs/**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
      - '**/Dockerfile'
      - '**/Dockerfile.*'
      - '**/*.dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
      - '**/docker-compose*.yml'
      - 'compose.yml'
      - 'compose.yaml'
      - 'docker/**'
      - '.github/workflows/docker.yml'
      - '!**/*.md'
      - '!docs/**'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-workflow-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  docker-build:
    name: Build and Test Docker Image
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

    - name: Build Docker image
      uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
      with:
        context: .
        push: false
        load: true
        tags: financial-asset-db:test
        cache-from: type=gha
        cache-to: type=gha,mode=max

    - name: Test Docker image
      run: |
        # Run container in background
        docker run -d --name test-container -p 7860:7860 financial-asset-db:test

        # Wait for container to be ready
        sleep 10

        # Check if container is running
        docker ps | grep test-container

        # Check container health (basic)
        docker inspect test-container --format='{{.State.Running}}'

        # Clean up
        docker stop test-container
        docker rm test-container

    - name: Test Docker Compose
      run: |
        # Test docker compose configuration
        docker compose config

        # Build with docker compose
        docker compose build

        # Start services
        docker compose up -d

        # Wait for services to be ready
        sleep 15

        # Check services are running
        docker compose ps

        # Clean up
        docker compose down

  docker-security:
    name: Docker Security Scan
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
    - name: Checkout repository
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Build Docker image for scanning
      run: docker build -t financial-asset-db:scan .

    - name: Install Trivy
      uses: aquasecurity/setup-trivy@81e514348e19b6112ce2a7e3ecbafe19c1e1f567 # v0.3.1

    - name: Run Trivy vulnerability scanner
      run: |
        trivy image \
          --format sarif \
          --output trivy-results.sarif \
          --severity CRITICAL,HIGH \
          financial-asset-db:scan
      continue-on-error: true

    - name: Upload Trivy results to GitHub Security
      uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4.37.1
      with:
        sarif_file: 'trivy-results.sarif'
      continue-on-error: true
