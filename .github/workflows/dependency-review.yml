# Dependency Review Action
#
# This Action will scan dependency manifest files that change as part of a Pull Request,
# surfacing known-vulnerable versions of the packages declared or updated in the PR.
# Once installed, if the workflow run is marked as required, PRs introducing known-vulnerable
# packages will be blocked from merging.
#
# Source repository: https://github.com/actions/dependency-review-action
# Public documentation: https://docs.github.com/en/code-security/supply-chain-security/understanding-your-software-supply-chain/about-dependency-review#dependency-review-enforcement
name: 'Dependency review'
"on":
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ "main", "Default" ]
    paths:
      - 'requirements*.txt'
      - 'Pipfile'
      - 'Pipfile.lock'
      - 'poetry.lock'
      - 'pyproject.toml'
      - 'package.json'
      - 'package-lock.json'
      - 'pnpm-lock.yaml'
      - 'yarn.lock'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'go.mod'
      - 'go.sum'
      - 'Gemfile'
      - 'Gemfile.lock'
      - 'pom.xml'
      - 'build.gradle'
      - 'build.gradle.kts'
      - 'composer.json'
      - 'composer.lock'
      - '.github/workflows/dependency-review.yml'
      - '!**/*.md'
      - '!docs/**'

# If using a dependency submission action in this workflow this permission will need to be set to:
#
# permissions:
#   contents: write
#
# https://docs.github.com/en/enterprise-cloud@latest/code-security/supply-chain-security/understanding-your-software-supply-chain/using-the-dependency-submission-api
permissions:
  contents: read
  # Write permissions for pull-requests are required for using the `comment-summary-in-pr` option, comment out if you aren't using this option
  pull-requests: write

concurrency:
  group: dependency-review-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    steps:
      - name: 'Checkout repository'
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: 'Dependency Review'
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          comment-summary-in-pr: always
          fail-on-severity: moderate
          # AI System Requirement (Article 15 - Robustness & Documentation):
          # We enforce GPL/LGPL denial to ensure the resulting system and graph engine
          # maintains deterministic deployment capabilities without introducing viral
          # licensing conditions that would restrict proprietary auditing and monitoring layers.
          deny-licenses: GPL-1.0-or-later, GPL-2.0-only, GPL-2.0-or-later, GPL-3.0-only, GPL-3.0-or-later, LGPL-2.0-only, LGPL-2.0-or-later, LGPL-2.1-only, LGPL-2.1-or-later, LGPL-3.0-only, LGPL-3.0-or-later
          # retry-on-snapshot-warnings: true
