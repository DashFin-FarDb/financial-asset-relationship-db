name: Dependency Check

# Per docs/ci-required-checks-policy.md this is a scheduled / push-to-main
# quality gate. It also runs on pull_request with a lean OS matrix so PRs
# still validate installability without multiplying action-resolution flakes
# across windows/macos runners (Set up job Internal Server Error / 503).

on:
  schedule:
    - cron: "0 0 * * *"
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  select-matrix:
    name: Select Dependency Check Matrix
    runs-on: ubuntu-latest
    outputs:
      runtime-os: ${{ steps.select.outputs.runtime-os }}
      dev-os: ${{ steps.select.outputs.dev-os }}
    steps:
      - name: Choose OS matrix for event
        id: select
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            # Lean PR matrix: fewer runners => fewer transient action-download failures.
            echo 'runtime-os=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
            echo 'dev-os=["ubuntu-latest"]' >> "$GITHUB_OUTPUT"
          else
            echo 'runtime-os=["ubuntu-latest","windows-latest","macos-latest"]' >> "$GITHUB_OUTPUT"
            echo 'dev-os=["ubuntu-latest","windows-latest"]' >> "$GITHUB_OUTPUT"
          fi

  test-runtime-deps:
    # Keep the historical check name (no OS suffix) so required-status contexts stay stable.
    name: Test Runtime Dependencies (Python ${{ matrix.python-version }})
    needs: select-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.select-matrix.outputs.runtime-os) }}
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and core tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install project from pyproject.toml
        run: |
          pip install -e .

      - name: Verify pyproject environment
        run: |
          pip check

      - name: Smoke-test declared pyproject runtime imports
        run: |
          python -c "import yaml; print('PyYAML (pyproject):', yaml.__version__)"
          python -c "import ruamel.yaml; print('ruamel.yaml (pyproject): ok')"
          python -c "import fastapi; print('FastAPI (pyproject):', fastapi.__version__)"
          python -c "import gradio; print('Gradio (pyproject):', gradio.__version__)"
          python -c "import numpy; print('NumPy (pyproject):', numpy.__version__)"

      - name: Install runtime requirements
        run: |
          pip install -r requirements.txt

      - name: Verify combined runtime environment
        run: |
          pip check

      - name: Smoke-test combined runtime imports
        run: |
          python -c "import yaml; print('PyYAML:', yaml.__version__)"
          python -c "import ruamel.yaml; print('ruamel.yaml installed')"
          python -c "import fastapi; print('FastAPI:', fastapi.__version__)"
          python -c "import gradio; print('Gradio:', gradio.__version__)"
          python -c "import numpy; print('NumPy:', numpy.__version__)"
          python -c "from app import FinancialAssetApp; assert callable(getattr(FinancialAssetApp, 'create_interface', None)); print('app.py entrypoint validated')"

  test-dev-deps:
    # Keep the historical check name (no OS suffix) so required-status contexts stay stable.
    name: Test Full Dev Tooling (Python ${{ matrix.python-version }})
    needs: select-matrix
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: ${{ fromJSON(needs.select-matrix.outputs.dev-os) }}
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}

      - name: Upgrade pip and core tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install runtime requirements
        run: |
          pip install -r requirements.txt

      - name: Install dev requirements
        run: |
          pip install -r requirements-dev.txt

      - name: Run pip check
        run: |
          pip check

      - name: Validate dependency requirement tests
        run: |
          pytest tests/integration/test_requirements_dev.py -v
          pytest tests/integration/test_requirements_pyyaml.py -v

  test-pyproject-dev-extra:
    name: Test pyproject dev extra
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Python 3.12
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      - name: Upgrade pip and core tools
        run: |
          python -m pip install --upgrade pip setuptools wheel

      - name: Install core dev extra
        run: |
          pip install -e ".[dev]"

      - name: Verify core dev extra
        run: |
          pip check
          pytest --version
          flake8 --version
          pylint --version
          mypy --version
          black --version
          isort --version
          ruff --version
