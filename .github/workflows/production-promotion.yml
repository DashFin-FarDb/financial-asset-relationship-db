name: Production Promotion

on:
  workflow_dispatch:
    inputs:
      evidence_file:
        description: "Path to the release-candidate evidence file"
        required: true
      base_url:
        description: "Optional exact match for HOSTED_READINESS_BASE_URL (must equal the production Environment secret when set)"
        required: false
      tags:
        description: "Manual sign-off tags (e.g., [manual-stop] or [star])"
        required: false
        default: ""

jobs:
  require-main:
    permissions: {}
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Require main branch
        env:
          REF: ${{ github.ref }}
        run: |
          if [ "$REF" != "refs/heads/main" ]; then
            echo "Error: production-promotion must be dispatched from refs/heads/main (got $REF)."
            exit 1
          fi

  promotion-gate:
    needs: require-main
    permissions:
      contents: read
    runs-on: ubuntu-latest
    environment:
      name: ${{ (contains(inputs.tags, '[manual-stop]') || contains(inputs.tags, '[star]')) && 'production-manual-gate' || 'production' }}
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: main
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"

      # Gate scripts are stdlib-only except check_database_authorization (psycopg2).
      # Install the minimal binary-only driver instead of the full requirements tree.
      - name: Install Dependencies
        run: |
          python -m pip install \
            --only-binary ":all:" \
            "psycopg2-binary==2.9.12"

      - name: Verify Production Baseline and Database Authorization
        id: db_authz
        env:
          EVIDENCE_FILE: ${{ github.event.inputs.evidence_file }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          ASSET_GRAPH_DATABASE_URL: ${{ secrets.ASSET_GRAPH_DATABASE_URL }}
          COORDINATION_DATABASE_URL: ${{ secrets.COORDINATION_DATABASE_URL }}
          POSTGRES_URL: ${{ secrets.POSTGRES_URL }}
          FARDB_UNTRUSTED_DATABASE_ROLES: ${{ secrets.FARDB_UNTRUSTED_DATABASE_ROLES }}
        run: |
          python scripts/verify_staging_promotion.py "$EVIDENCE_FILE"

          # Fail closed on missing required boundaries before authz runs. The checker only
          # validates URLs that are present, so an app-only secret set must not pass H-P0-04.
          if [ -z "$ASSET_GRAPH_DATABASE_URL" ]; then
            echo '{"status":"failed","reason":"missing_asset_graph_database_url"}' > db-authz-output.json
            echo "H-P0-04 requires ASSET_GRAPH_DATABASE_URL on the production Environment."
            exit 1
          fi
          if [ -z "${DATABASE_URL}${POSTGRES_URL}" ]; then
            echo '{"status":"failed","reason":"missing_auth_database_url"}' > db-authz-output.json
            echo "H-P0-04 requires DATABASE_URL or POSTGRES_URL on the production Environment."
            exit 1
          fi
          # Production topology expects locks on the coordination boundary.
          if [ -z "$COORDINATION_DATABASE_URL" ]; then
            echo '{"status":"failed","reason":"missing_coordination_database_url"}' > db-authz-output.json
            echo "H-P0-04 requires COORDINATION_DATABASE_URL on the production Environment (locks=coordination)."
            exit 1
          fi

          set +e
          # Bounded stdout/stderr only (control ids/messages). Do not upload raw logs as artifacts.
          python scripts/check_database_authorization.py
          code=$?
          if [ "$code" -eq 0 ]; then
            echo '{"status":"passed"}' > db-authz-output.json
            exit 0
          fi
          echo "{\"status\":\"failed\",\"exit_code\":$code}" > db-authz-output.json
          echo "Database authorization gate failed (H-P0-04)."
          exit 1

      - name: Check Hosted Readiness
        id: readiness
        env:
          HOSTED_READINESS_BASE_URL: ${{ secrets.HOSTED_READINESS_BASE_URL }}
          BASE_URL_INPUT: ${{ github.event.inputs.base_url }}
        run: |
          if [ -z "$HOSTED_READINESS_BASE_URL" ]; then
            echo "Error: HOSTED_READINESS_BASE_URL secret is required for production promotion"
            exit 1
          fi
          if [ -n "$BASE_URL_INPUT" ] && [ "$BASE_URL_INPUT" != "$HOSTED_READINESS_BASE_URL" ]; then
            echo "Error: base_url input must exactly match HOSTED_READINESS_BASE_URL"
            exit 1
          fi
          URL="$HOSTED_READINESS_BASE_URL"
          echo "::add-mask::$URL"

          # --require-persistence also enables --assets-smoke (H-P1-01 / H-P1-02).
          # Write to a temp file first so a failed run does not leave an empty artifact.
          if ! python scripts/check_hosted_readiness.py "$URL" --json --require-persistence > readiness-output.tmp; then
            if [ -s readiness-output.tmp ]; then
              mv readiness-output.tmp readiness-output.json
            else
              rm -f readiness-output.tmp
            fi
            exit 1
          fi
          mv readiness-output.tmp readiness-output.json

      - name: Assert Persistence Loaded
        run: |
          if [ "$(jq -r '.observed_fields."graph_persistence_configured"' readiness-output.json)" != "true" ]; then
            echo "Error: graph_persistence_configured is not true in the readiness output."
            exit 1
          fi
          if [ "$(jq -r '.observed_fields."graph.persistence_enabled"' readiness-output.json)" != "true" ]; then
            echo "Error: graph.persistence_enabled is not true in the readiness output."
            exit 1
          fi
          if [ "$(jq -r '.observed_fields."graph.persistence_loaded"' readiness-output.json)" != "true" ]; then
            echo "Error: graph.persistence_loaded is not true in the readiness output."
            exit 1
          fi
          if [ "$(jq -r '.observed_fields."graph.startup_source"' readiness-output.json)" != "persisted" ]; then
            echo "Error: startup_source is not \"persisted\" in the readiness output."
            exit 1
          fi
          if [ "$(jq -r '.checks.assets_smoke.passed // false' readiness-output.json)" != "true" ]; then
            echo "Error: assets_smoke check did not pass in the readiness output."
            exit 1
          fi
          total="$(jq -r '.observed_fields."assets.total" // 0' readiness-output.json)"
          if ! [ "$total" -gt 0 ] 2>/dev/null; then
            echo "Error: assets.total is not a positive count in the readiness output."
            exit 1
          fi
          echo "Assertion passed: graph is persistence loaded and assets smoke passed."

      - name: Audit Logging
        if: always()
        run: |
          echo "Logging promotion decision for AI system transparency (Article 13)..."
          echo "Production promotion run at $(date -u) — result: ${{ job.status }}" >> promotion_audit.log

      - name: Prepare Artifact Placeholders
        if: always()
        working-directory: ${{ github.workspace }}
        run: |
          if [ ! -s readiness-output.json ]; then
            echo '{"status":"skipped","reason":"hosted_readiness_not_run"}' > readiness-output.json
          fi
          if [ ! -s db-authz-output.json ]; then
            echo '{"status":"skipped","reason":"db_authz_not_run"}' > db-authz-output.json
          fi

      - name: Upload Artifacts
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: production-readiness
          path: |
            readiness-output.json
            db-authz-output.json
            promotion_audit.log
