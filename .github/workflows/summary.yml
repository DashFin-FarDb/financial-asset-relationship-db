name: Summarize new issues

permissions:
  issues: write
  contents: read

"on":
  issues:
    types: [opened]

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      models: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # Security: Sanitize untrusted GitHub context values before AI inference
      # to prevent prompt injection attacks. User-controlled fields (title, body)
      # are passed through env vars and sanitized to remove potentially malicious
      # characters and limit length to prevent data exfiltration.
      - name: Sanitize issue inputs
        id: sanitize
        run: |
          # Sanitize title: remove special characters and limit length
          SANITIZED_TITLE=$(printf '%s' "$ISSUE_TITLE" | sed 's/[^a-zA-Z0-9 .,?!-]//g' | head -c 200)
          printf 'title=%s\n' "$SANITIZED_TITLE" >> "$GITHUB_OUTPUT"

          # Sanitize body: remove special characters and limit length.
          # Use a generated delimiter for multiline output to avoid delimiter collisions.
          SANITIZED_BODY=$(printf '%s' "$ISSUE_BODY" | sed 's/[^a-zA-Z0-9 .,?!\n-]//g' | head -c 1000)
          BODY_DELIMITER="SANITIZED_ISSUE_BODY_$(uuidgen)"
          {
            printf 'body<<%s\n' "$BODY_DELIMITER"
            printf '%s\n' "$SANITIZED_BODY"
            printf '%s\n' "$BODY_DELIMITER"
          } >> "$GITHUB_OUTPUT"
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}

      - name: Run AI inference
        id: inference
        uses: actions/ai-inference@b81b2afb8390ee6839b494a404766bef6493c7d9 # v1
        with:
          prompt: |
            Summarize the following GitHub issue in one paragraph:
            Title: ${{ steps.sanitize.outputs.title }}
            Body: ${{ steps.sanitize.outputs.body }}

      # Security: Use properly quoted environment variables to prevent command injection
      # Never interpolate LLM outputs directly into shell commands
      - name: Comment with AI summary
        run: |
          gh issue comment "$ISSUE_NUMBER" --body "$RESPONSE"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          RESPONSE: ${{ steps.inference.outputs.response }}
