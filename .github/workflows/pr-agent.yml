name: PR Agent Workflow

permissions:
  contents: read

"on":
  pull_request:
    types: [opened, synchronize, reopened]
  pull_request_review:
    types: [submitted]
  issue_comment:
    types: [created]
  check_suite:
    types: [completed]

jobs:
  pr-agent-action:
    permissions:
      issues: write
    if: |
      (github.event_name == 'pull_request_review' && github.event.review.state == 'changes_requested') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@copilot'))
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '18'

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Install Node dependencies
        working-directory: ./frontend
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          elif [ -f package.json ]; then
            npm install
          else
            echo "Warning: No package.json found in frontend directory"
            exit 1
          fi

      - name: Parse PR Context
        id: pr-context
        run: |
          if [ "${{ github.event_name }}" = "issue_comment" ] && [ -z "${{ github.event.issue.pull_request.url }}" ]; then
            echo "pr_data={}" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          PR_DATA=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}" \
            --jq '{number: .number, title: .title, changed_files: .changed_files}')
          echo "pr_data=${PR_DATA}" >> "$GITHUB_OUTPUT"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

      - name: Run Python Linting
        run: |
          python -m flake8 --max-line-length=88 --extend-ignore=E203,W503 api/ src/
          python -m black --check api/ src/

      - name: Run Python Tests
        run: |
          python -m pytest tests/ -v --cov=src --cov-report=term-missing

      - name: Run Frontend Linting
        working-directory: ./frontend
        run: |
          npm run lint
          npm run type-check

      - name: Run Frontend Tests
        working-directory: ./frontend
        run: npm test -- --coverage --watchAll=false

      - name: Create PR Comment
        if: always()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🤖 PR Agent Status Update\n\n**Review Analysis Complete**\n- ✅ Code quality checks passed\n- ✅ Tests are running\n\n*Automated by PR Agent Workflow*'
            });

  auto-merge-check:
    permissions:
      issues: write
      pull-requests: write
    if: |
      (github.event_name == 'pull_request' && github.event.action == 'synchronize') ||
      (github.event_name == 'pull_request_review' && github.event.review.state == 'approved') ||
      (github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Check if PR is ready for auto-merge
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const { data: reviews } = await github.rest.pulls.listReviews({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });

            const { data: checks } = await github.rest.checks.listForRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: pr.head.sha,
            });

            const allChecksPassed = checks.check_runs.every(check =>
              check.status === 'completed' && check.conclusion === 'success'
            );

            const hasApproval = reviews.some(review =>
              review.state === 'APPROVED'
            );

            if (allChecksPassed && hasApproval && pr.draft === false) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: '🚀 **PR Ready for Merge**\n\n✅ All checks passed\n✅ Approved by reviewer\n\nThis PR is ready to be merged!'
              });
            }

  dependency-update:
    permissions:
      pull-requests: write
    if: github.event_name == 'pull_request' && contains(github.event.pull_request.title, 'deps')
    runs-on: ubuntu-latest

    steps:
      - name: Auto-approve dependency updates
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = context.payload.pull_request.title.toLowerCase();
            const author = context.payload.pull_request.user.login;

            if ((title.includes('bump') || title.includes('update')) &&
                (author === 'dependabot[bot]' || author === 'renovate[bot]')) {

              await github.rest.pulls.createReview({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: context.issue.number,
                event: 'APPROVE',
                body: '🤖 Auto-approved dependency update'
              });
            }
