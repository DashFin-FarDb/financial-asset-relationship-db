name: Staging Promotion

on:
  workflow_dispatch:
    inputs:
      evidence_file:
        description: 'Path to the release-candidate evidence file'
        required: true
      base_url:
        description: 'Staging base URL'
        required: true

jobs:
  promotion-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Verify Staging Baseline Checklist
        run: python scripts/verify_staging_promotion.py "${{ github.event.inputs.evidence_file }}"

      - name: Check Hosted Readiness
        id: readiness
        env:
          HOSTED_READINESS_BASE_URL: ${{ secrets.HOSTED_READINESS_BASE_URL }}
        run: |
          URL="${{ github.event.inputs.base_url || env.HOSTED_READINESS_BASE_URL }}"
          if [ -n "$URL" ]; then
            echo "::add-mask::$URL"
          fi

          python scripts/check_hosted_readiness.py $URL --json --require-persistence > readiness-output.json

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: staging-readiness
          path: readiness-output.json

      - name: Assert Persistence Loaded
        run: |
          if ! grep -q '"persistence_loaded": true' readiness-output.json; then
            echo "Error: persistence_loaded is not true in the readiness output."
            exit 1
          fi
          if ! grep -q '"startup_source": "persisted"' readiness-output.json; then
            echo "Error: startup_source is not \"persisted\" in the readiness output."
            exit 1
          fi
          echo "Assertion passed: graph is persistence loaded."
