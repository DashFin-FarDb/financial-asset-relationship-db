name: Production Container

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Build API Container
        run: docker build -t fardb-api -f Dockerfile.api .

      - name: Build Frontend Container
        run: docker build -t fardb-frontend -f Dockerfile.frontend .

      - name: Smoke Test API
        run: |
          docker run -d --name api_test -p 8000:8000 \
            -e ENV=production \
            -e DATABASE_URL="sqlite:////tmp/fardb.db" \
            -e SECRET_KEY="ci-smoke-test-secret-key-32-chars-min" \
            fardb-api
          # Poll until healthy
          timeout=30
          count=0
          while ! curl -fsS http://localhost:8000/api/health > /dev/null; do
            count=$((count+1))
            if [ $count -ge $timeout ]; then
              echo "API failed to start within $timeout seconds"
              docker logs api_test
              exit 1
            fi
            sleep 1
          done

          # Validate endpoints
          curl -fsS http://localhost:8000/api/health
          curl -fsS http://localhost:8000/api/health/detailed

          docker stop api_test
          docker rm api_test

      - name: Smoke Test Frontend
        run: |
          docker run -d --name frontend_test -p 3000:3000 fardb-frontend

          # Poll until healthy (basic TCP check for Next.js)
          timeout=30
          count=0
          while ! curl -fsS http://localhost:3000 > /dev/null; do
            count=$((count+1))
            if [ $count -ge $timeout ]; then
              echo "Frontend failed to start within $timeout seconds"
              docker logs frontend_test
              exit 1
            fi
            sleep 1
          done

          docker stop frontend_test
          docker rm frontend_test

      - name: Test Environment Variable Failure Behavior
        run: |
          set +e
          timeout 15s docker run --name api_bad_env \
            -e ENV=production \
            -e SECRET_KEY="ci-smoke-test-secret-key-32-chars-min" \
            -e DATABASE_URL="bad_scheme://bad" \
            fardb-api
          exit_code=$?
          set -e

          docker rm -f api_bad_env >/dev/null 2>&1 || true

          if [ "$exit_code" -eq 0 ] || [ "$exit_code" -eq 124 ]; then
            echo "Expected container to exit quickly with a non-zero status for invalid DATABASE_URL"
            exit 1
          fi
