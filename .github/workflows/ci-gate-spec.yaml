---
name: Stage 5C - Distributed Coordination Safety Gates
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: stage-5c-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # -----------------------------
  # Gate A — Static Invariant Analysis
  # -----------------------------
  static-coordination-gates:
    name: Gate A - Static Coordination Invariants
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          # Keep Gate A on the same ruff band as requirements-dev.txt (<0.16).
          # Pin exact wheels with --only-binary for Sonar githubactions:S8541/S8544.
          pip install --only-binary ":all:" "ruff==0.15.22" "mypy==1.17.1"

      - name: Run type checking (mypy)
        run: |
          # Gate A intentionally validates the invariant scanner itself only.
          # Repository-wide typing debt is tracked in separate workflows.
          # --follow-imports=silent keeps this gate focused on the target file
          # instead of failing on unrelated imported-module type issues.
          mypy --follow-imports=silent tools/ci/check_coordination_invariants.py

      - name: Run linting (ruff strict mode)
        run: ruff check tools/ci/check_coordination_invariants.py

      - name: Coordination invariant scan (custom static rules)
        run: |
          python tools/ci/check_coordination_invariants.py

          # Expected checks enforced in script:
          # - single ownership writer enforcement
          # - no bypass of RecoveryGate
          # - no duplicate execution entrypoints
          # - no unsafe lock fallback logic

  # -----------------------------
  # Gate B — Multi-Worker Simulation
  # -----------------------------
  multi-worker-simulation:
    name: Gate B - Multi-Worker Coordination Simulation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: static-coordination-gates
    outputs:
      tests_ran: ${{ steps.run_tests.outputs.tests_ran }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d test_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-xdist

      - name: Run multi-worker coordination tests
        id: run_tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          ASSET_GRAPH_DATABASE_URL: postgresql://test:test@localhost:5432/test_db
        run: |
          if [ -d tests/coordination ]; then
            echo "tests_ran=true" >> "$GITHUB_OUTPUT"
            pytest tests/coordination \
              -n 4 \
              --maxfail=1 \
              -q
          else
            echo "tests_ran=false" >> "$GITHUB_OUTPUT"
            echo "⚠️  Multi-worker coordination test suite not yet implemented: tests/coordination"
            echo "Stage 5C.1 focuses on failure detection; coordination tests deferred to future stages."
            echo "Skipping Gate B - Multi-Worker Simulation for now."
          fi

          # Required enforced assertions inside tests:
          # - single active owner invariant
          # - no overlapping rebuild execution
          # - monotonic ownership transitions

  # -----------------------------
  # Gate C — Failure Injection Tests
  # -----------------------------
  failure-injection-gates:
    name: Gate C - Failure Mode Injection
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: multi-worker-simulation
    outputs:
      tests_ran: ${{ steps.run_tests.outputs.tests_ran }}

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U test -d test_db"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run failure injection test suite
        id: run_tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test_db
          COORDINATION_FAILURE_MODES: "enabled"
        run: |
          if [ -d tests/failure_injection ]; then
            echo "tests_ran=true" >> "$GITHUB_OUTPUT"
            pytest tests/failure_injection \
              -q \
              --maxfail=1
          else
            echo "tests_ran=false" >> "$GITHUB_OUTPUT"
            echo "Skipping failure injection tests: tests/failure_injection directory not found."
          fi

          # Must include:
          # - lock expiry mid-execution
          # - worker crash simulation
          # - DB latency/partition simulation
          # - cancellation during execution
          # - restart storm simulation

  # -----------------------------
  # Gate D — Observability Metrics Validation
  # -----------------------------
  observability-metrics-validation:
    name: Gate D - Observability Metrics Validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: failure-injection-gates

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Verify lock refresh metrics exist
        run: |
          python - <<'PY'
          from api.metrics import (
              LOCK_REFRESH_TOTAL,
              LOCK_REFRESH_DURATION,
              HEARTBEAT_UPDATE_TOTAL,
              HEARTBEAT_LAST_SUCCESS_TIMESTAMP,
          )
          print('\u2705 All lock refresh and heartbeat metrics are defined')
          PY

      - name: Run metrics unit tests
        run: |
          pytest tests/unit/test_metrics.py -v
          pytest tests/unit/test_metrics_endpoint.py -v

      - name: Verify metrics endpoint exposes new metrics
        env:
          DATABASE_URL: "sqlite:///:memory:"
          SECRET_KEY: test-secret-key-for-ci
          ADMIN_USERNAME: admin
          ADMIN_PASSWORD: admin
        run: |
          # Start API in background
          python -m uvicorn api.main:app --host 127.0.0.1 --port 8000 > /tmp/api.log 2>&1 &
          API_PID=$!

          # Wait for API to be ready (poll for up to 30 seconds)
          API_READY=false
          for i in {1..30}; do
            if curl -sf http://127.0.0.1:8000/api/health > /dev/null 2>&1; then
              echo "✅ API is ready after ${i} seconds"
              API_READY=true
              break
            fi
            if ! kill -0 $API_PID 2>/dev/null; then
              echo "❌ API process died during startup"
              cat /tmp/api.log
              exit 1
            fi
            sleep 1
          done

          if [ "$API_READY" != "true" ]; then
            echo "❌ API failed to become healthy within 30 seconds"
            cat /tmp/api.log
            kill $API_PID 2>/dev/null || true
            exit 1
          fi

          # Check metrics endpoint
          if ! curl -s http://127.0.0.1:8000/api/metrics | grep -q "rebuild_lock_refresh_total"; then
            echo "❌ rebuild_lock_refresh_total not found in metrics"
            kill $API_PID 2>/dev/null || true
            cat /tmp/api.log
            exit 1
          fi

          if ! curl -s http://127.0.0.1:8000/api/metrics | grep -q "rebuild_heartbeat_update_total"; then
            echo "❌ rebuild_heartbeat_update_total not found in metrics"
            kill $API_PID 2>/dev/null || true
            cat /tmp/api.log
            exit 1
          fi

          echo "✅ All observability metrics are exposed at /api/metrics"
          kill $API_PID 2>/dev/null || true

  # -----------------------------
  # Final Aggregation Gate
  # -----------------------------
  coordination-safety-summary:
    name: Final Coordination Safety Gate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs:
      - static-coordination-gates
      - multi-worker-simulation
      - failure-injection-gates
      - observability-metrics-validation

    steps:
      - name: Verify all gates passed
        run: |
          echo "=== Stage 5C Coordination Safety Gate Results ==="
          echo ""
          echo "Gate A (Static Coordination Invariants): ✅ PASSED"
          echo "Gate B (Multi-Worker Simulation): ${{ needs.multi-worker-simulation.outputs.tests_ran == 'true' && '✅ PASSED' || '⚠️  SKIPPED (tests/coordination not implemented)' }}"
          echo "Gate C (Failure Mode Injection): ${{ needs.failure-injection-gates.outputs.tests_ran == 'true' && '✅ PASSED' || '⚠️  SKIPPED (tests/failure_injection not implemented)' }}"
          echo "Gate D (Observability Metrics): ✅ PASSED"
          echo ""

          # Gate A and Gate D are always required
          # Gates B and C are aspirational for this PR stage
          gate_b_status="${{ needs.multi-worker-simulation.outputs.tests_ran }}"
          gate_c_status="${{ needs.failure-injection-gates.outputs.tests_ran }}"

          if [ "$gate_b_status" == "true" ] && [ "$gate_c_status" == "true" ]; then
            echo "✅ All coordination safety gates PASSED with full test coverage."
            echo "System is safe for merge under distributed coordination invariants."
          elif [ "$gate_b_status" == "false" ] || [ "$gate_c_status" == "false" ]; then
            echo "⚠️  WARNING: Some coordination tests were SKIPPED (not yet implemented)."
            echo "Gate A (static invariants) and Gate D (observability) passed. Gates B/C deferred to future PRs."
            echo "This is ACCEPTABLE for Stage 5C.2 which focuses on observability metrics."
            echo ""
            echo "Future work required:"
            [ "$gate_b_status" == "false" ] && echo "  - Implement tests/coordination (multi-worker simulation)"
            [ "$gate_c_status" == "false" ] && echo "  - Implement tests/failure_injection (failure mode tests)"
          else
            echo "❌ ERROR: Unexpected gate status. Check workflow outputs."
            exit 1
          fi
