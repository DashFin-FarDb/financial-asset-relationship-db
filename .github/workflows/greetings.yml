name: Greetings

on: [pull_request_target, issues]

jobs:
  greeting:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
    - uses: actions/first-interaction@v1
      with:
        repo-token: ${{ secrets.GITHUB_TOKEN }}
        issue-message: "👋 Welcome! Thank you for opening your first issue. A maintainer will review it soon."
        pr-message: "🎉 Thank you for your first pull request! CI checks will run automatically. A maintainer will review your changes."
