name: Hosted readiness smoke check

"on":
  workflow_dispatch:
    inputs:
      base_url:
        description: "Hosted deployment base URL. Prefer repository secret HOSTED_READINESS_BASE_URL for persistent targets."
        required: false
        type: string
      timeout:
        description: "Request timeout in seconds."
        required: false
        default: "30"
        type: string
      require_persistence:
        description: "Prove persisted graph load rather than fallback generation."
        required: false
        default: false
        type: boolean

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  hosted-readiness:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      HOSTED_READINESS_BASE_URL: ${{ inputs.base_url || secrets.HOSTED_READINESS_BASE_URL }}
      HOSTED_READINESS_TIMEOUT: ${{ inputs.timeout }}
      HOSTED_READINESS_REQUIRE_PERSISTENCE: ${{ inputs.require_persistence }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Skip when hosted readiness target is not configured
        if: ${{ env.HOSTED_READINESS_BASE_URL == '' }}
        run: echo "Hosted readiness check skipped - no base URL configured."

      - name: Run hosted readiness smoke check
        if: ${{ env.HOSTED_READINESS_BASE_URL != '' }}
        shell: bash
        run: |
          mask_value="${HOSTED_READINESS_BASE_URL//%/%25}"
          mask_value="${mask_value//$'\r'/%0D}"
          mask_value="${mask_value//$'\n'/%0A}"
          printf '::add-mask::%s\n' "$mask_value"
          cmd=(python scripts/check_hosted_readiness.py "$HOSTED_READINESS_BASE_URL" --timeout "$HOSTED_READINESS_TIMEOUT")
          if [ "${HOSTED_READINESS_REQUIRE_PERSISTENCE}" = "true" ]; then
            # Enables persisted-graph proof and auto-enables --assets-smoke (H-P1-01).
            cmd+=(--require-persistence)
          fi
          "${cmd[@]}"
