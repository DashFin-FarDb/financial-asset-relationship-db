name: Validate System Manifest

"on":
  pull_request:
    paths:
      - '.elastic-copilot/memory/systemManifest.md'
  push:
    branches:
      - main
    paths:
      - '.elastic-copilot/memory/systemManifest.md'
  workflow_dispatch:

jobs:
  validate:
    name: Check for duplicate sections (MD024)
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Validate systemManifest.md
        run: |
          python scripts/validate_manifest.py

      - name: Provide fix instructions if validation fails
        if: failure()
        run: |
          echo "::error::systemManifest.md contains duplicate sections."
          echo "To fix this issue, run: python scripts/deduplicate_manifest.py"
          echo "Then commit the cleaned manifest file."
