# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow will initiate a Contrast Scan on your built artifact, and subsequently upload the results SARIF to Github.
# Because Contrast Scan is designed to run against your deployable artifact, you need to build an artifact that will be passed to the Contrast Scan Action.
# Contrast Scan currently supports Java, JavaScript and .NET artifacts.
# For more information about the Contrast Scan GitHub Action see here: https://github.com/Contrast-Security-OSS/contrastscan-action

# Pre-requisites:
# All Contrast related account secrets should be configured as GitHub secrets to be passed as inputs to the Contrast Scan Action.
# The required secrets are CONTRAST_API_KEY, CONTRAST_ORGANIZATION_ID and CONTRAST_AUTH_HEADER.

"on":
  push:
    branches: [ "main", "Default" ]
    paths:
      - '**/*.jar'
      - '**/*.war'
      - '**/*.zip'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.jsx'
      - '**/*.dll'
      - '**/*.exe'
      - '**/*.csproj'
      - '**/*.sln'
      - '**/*.java'
      - 'pom.xml'
      - 'build.gradle'
      - 'build.gradle.kts'
      - '.github/workflows/contrast-scan.yml'
      - '!**/*.md'
      - '!docs/**'
  pull_request:
    types: [opened, synchronize, reopened]
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
    paths:
      - '**/*.jar'
      - '**/*.war'
      - '**/*.zip'
      - '**/*.js'
      - '**/*.ts'
      - '**/*.tsx'
      - '**/*.jsx'
      - '**/*.dll'
      - '**/*.exe'
      - '**/*.csproj'
      - '**/*.sln'
      - '**/*.java'
      - 'pom.xml'
      - 'build.gradle'
      - 'build.gradle.kts'
      - '.github/workflows/contrast-scan.yml'
      - '!**/*.md'
      - '!docs/**'
  schedule:
    - cron: '32 20 * * 3'

permissions:
  contents: read

name: Scan analyze workflow
jobs:
  build-and-scan:
    concurrency:
      group: contrast-${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true
    permissions:
        contents: read # for actions/checkout
        security-events: write # for github/codeql-action/upload-sarif
        actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    runs-on: ubuntu-latest
    # check out project
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
    # -name: Build Project
    # ...
    # Scan Artifact
    - name: Preflight Contrast scan inputs
      id: contrast_preflight
      env:
        CONTRAST_API_KEY: ${{ secrets.CONTRAST_API_KEY }}
        CONTRAST_ORGANIZATION_ID: ${{ secrets.CONTRAST_ORGANIZATION_ID }}
        CONTRAST_AUTH_HEADER: ${{ secrets.CONTRAST_AUTH_HEADER }}
        CONTRAST_ARTIFACT_PATH: ${{ vars.CONTRAST_ARTIFACT_PATH }}
      run: |
        if [ -z "${CONTRAST_API_KEY}" ] || [ -z "${CONTRAST_ORGANIZATION_ID}" ] || [ -z "${CONTRAST_AUTH_HEADER}" ]; then
          echo "Contrast secrets are not configured; skipping scan."
          echo "run_scan=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if [ -z "${CONTRAST_ARTIFACT_PATH}" ]; then
          echo "Contrast artifact path is not configured (vars.CONTRAST_ARTIFACT_PATH); skipping scan."
          echo "run_scan=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        if [ ! -f "${CONTRAST_ARTIFACT_PATH}" ]; then
          echo "Contrast artifact not found at ${CONTRAST_ARTIFACT_PATH}; skipping scan."
          echo "run_scan=false" >> "$GITHUB_OUTPUT"
          exit 0
        fi
        echo "artifact_path=${CONTRAST_ARTIFACT_PATH}" >> "$GITHUB_OUTPUT"
        echo "run_scan=true" >> "$GITHUB_OUTPUT"
    - name: Contrast Scan Action
      if: steps.contrast_preflight.outputs.run_scan == 'true'
      uses: Contrast-Security-OSS/contrastscan-action@7352a45d9678ec8a434cf061b07ffb51c1e351a1
      with:
        artifact: ${{ steps.contrast_preflight.outputs.artifact_path }}
        apiKey: ${{ secrets.CONTRAST_API_KEY }}
        orgId: ${{ secrets.CONTRAST_ORGANIZATION_ID }}
        authHeader: ${{ secrets.CONTRAST_AUTH_HEADER }}
    #Upload the results to GitHub
    - name: Upload SARIF file
      if: steps.contrast_preflight.outputs.run_scan == 'true'
      uses: github/codeql-action/upload-sarif@5c8a8a642e79153f5d047b10ec1cba1d1cc65699 # v3
      with:
        sarif_file: results.sarif # The file name must be 'results.sarif', as this is what the Github Action will output
