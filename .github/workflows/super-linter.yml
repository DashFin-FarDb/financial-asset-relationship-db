# This workflow executes several linters on changed files based on languages used in your code base whenever
# you push a code or open a pull request.
#
# You can adjust the behavior by modifying this file.
# For more information, see:
# https://github.com/github/super-linter
name: Lint Code Base

"on":
  push:
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "**/*.png"
      - "**/*.jpg"
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["main"]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - "**/*.png"
      - "**/*.jpg"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
jobs:
  run-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Full git history is needed to get a proper list of changed files within `super-linter`
          fetch-depth: 0

      - name: Lint Code Base
        uses: github/super-linter@b807e99ddd37e444d189cfd2c2ca1274d8ae8ef1 # v7
        env:
          VALIDATE_ALL_CODEBASE: false
          DEFAULT_BRANCH: "main"
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_JAVASCRIPT_ES: false
          VALIDATE_JAVASCRIPT_STANDARD: false
          VALIDATE_JSHINT: false
          VALIDATE_JAVASCRIPT_JSX: false
          VALIDATE_TYPESCRIPT_ES: false
          VALIDATE_TYPESCRIPT_STANDARD: false
          VALIDATE_TYPESCRIPT_TSX: false
          VALIDATE_JSCPD: false
          # Temporarily disable actionlint here: legacy workflows still trip
          # super-linter's embedded actionlint and block unrelated PRs.
          # Re-enable once workflow actionlint debt is cleared repo-wide.
          VALIDATE_GITHUB_ACTIONS: false
          # CHECKOV currently reports pre-existing repository-wide findings
          # (e.g., workflow_dispatch input policy + Dockerfile healthcheck)
          # and blocks unrelated PRs in this generic lint gate.
          VALIDATE_CHECKOV: false
          # YAML_PRETTIER currently flags broad legacy workflow formatting debt.
          # Keep dedicated workflow semantics checks elsewhere.
          VALIDATE_YAML_PRETTIER: false
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_FLAKE8: false
          VALIDATE_PYTHON_ISORT: false
          VALIDATE_PYTHON_MYPY: false
          VALIDATE_PYTHON_PYLINT: false
