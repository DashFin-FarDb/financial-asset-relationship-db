name: Architecture Compound

# Observe PRs/merges and synthesize docs/compound onto knowledge/architecture-expert.
# Never auto-merges to main. Emitters append; synthesize alone rewrites canon docs.

"on":
  pull_request_target:
    types: [opened, synchronize, reopened, labeled, closed]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_synthesize:
        description: Force synthesize even for dependency-bot-only batches
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: architecture-compound-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  synthesize:
    name: Synthesize knowledge branch
    runs-on: ubuntu-latest
    # Write-capable synthesis never runs on pull_request because PRs control
    # the workflow file and scripts before they land on main. PR observation
    # uses pull_request_target so trusted base-branch code appends the record.
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Checkout workflow source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          path: source
          fetch-depth: 1
          persist-credentials: false

      - name: Checkout knowledge branch
        id: checkout_knowledge
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: knowledge/architecture-expert
          path: knowledge
          fetch-depth: 0
          persist-credentials: false
        continue-on-error: true

      - name: Prepare knowledge branch fallback
        if: steps.checkout_knowledge.outcome == 'failure'
        shell: bash
        run: rm -rf knowledge

      - name: Checkout main for new knowledge branch
        if: steps.checkout_knowledge.outcome == 'failure'
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          path: knowledge
          fetch-depth: 0
          persist-credentials: false

      - name: Ensure knowledge branch exists
        working-directory: knowledge
        shell: bash
        run: |
          set -euo pipefail
          git checkout -B knowledge/architecture-expert

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Build and append observation
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_ACTION: ${{ github.event.action || '' }}
          PR_MERGED_JSON: ${{ toJson(github.event.pull_request.merged || false) }}
          EVENT_NAME: ${{ github.event_name }}
          FORCE_INPUT: ${{ github.event.inputs.force_synthesize || 'false' }}
        working-directory: knowledge
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_PYTHONPATH="${GITHUB_WORKSPACE}/source/scripts"
          FORCE_SYNTH="false"
          if [ "$EVENT_NAME" = "pull_request" ] || [ "$EVENT_NAME" = "pull_request_target" ]; then
            if [ "$PR_ACTION" = "closed" ] && [ "$PR_MERGED_JSON" = "true" ]; then
              STATUS="landed"
              EVENT_TYPE="pull_request.closed"
              FORCE_SYNTH="true"
            else
              STATUS="provisional"
              EVENT_TYPE="pull_request.${PR_ACTION}"
            fi
            PRIMARY_REF="pr:${PR_NUMBER}"
            SUMMARY=$(jq -rn --arg t "$PR_TITLE" '$t[:240]')
            FILES_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" --paginate -q '.[].filename' 2>/dev/null | jq -R -s -c 'split("\n")|map(select(length>0))' || echo '[]')
          elif [ "$EVENT_NAME" = "push" ]; then
            STATUS="landed"
            MERGED_PR_JSON=$(gh api -H "Accept: application/vnd.github+json" "repos/${GITHUB_REPOSITORY}/commits/${GITHUB_SHA}/pulls" 2>/dev/null || echo '[]')
            MERGED_PR_NUMBER=$(jq -r 'map(select(.merged_at != null)) | sort_by(.merged_at) | last | .number // empty' <<<"$MERGED_PR_JSON")
            MERGED_PR_TITLE=$(jq -r 'map(select(.merged_at != null)) | sort_by(.merged_at) | last | .title // empty' <<<"$MERGED_PR_JSON")
            if [ -n "$MERGED_PR_NUMBER" ]; then
              PRIMARY_REF="pr:${MERGED_PR_NUMBER}"
              SUMMARY=$(jq -rn --arg t "$MERGED_PR_TITLE" --arg sha "$GITHUB_SHA" 'if $t == "" then "Merge/push to main " + $sha else $t end | .[:240]')
            else
              PRIMARY_REF="sha:${GITHUB_SHA}"
              SUMMARY="Merge/push to main ${GITHUB_SHA}"
            fi
            EVENT_TYPE="push.main"
            FORCE_SYNTH="true"
            FILES_JSON=$(jq -c '[((.commits // [])[] | (.modified // [])[], (.added // [])[], (.removed // [])[])] | unique | map(select(. != null and . != ""))' "$GITHUB_EVENT_PATH" 2>/dev/null || echo '[]')
          else
            STATUS="landed"
            PRIMARY_REF="manual:${GITHUB_RUN_ID}"
            SUMMARY="Manual compound workflow_dispatch"
            EVENT_TYPE="workflow_dispatch"
            FORCE_SYNTH="true"
            FILES_JSON='[]'
          fi
          if [ "$FORCE_INPUT" = "true" ]; then
            FORCE_SYNTH="true"
          fi
          DOMAINS_JSON=$(
            PYTHONPATH="$SOURCE_PYTHONPATH" FILES_JSON="$FILES_JSON" python - <<'PY'
          import json
          import os

          from compound.schema import detect_domains_from_paths

          print(json.dumps(list(detect_domains_from_paths(json.loads(os.environ["FILES_JSON"])))))
          PY
          )
          jq -n \
            --arg id "gh-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --arg source "github" \
            --arg event_type "$EVENT_TYPE" \
            --arg status "$STATUS" \
            --arg primary_ref "$PRIMARY_REF" \
            --arg summary "$SUMMARY" \
            --argjson domains "$DOMAINS_JSON" \
            '{
              observation_id: $id,
              source: $source,
              event_type: $event_type,
              status: $status,
              primary_ref: $primary_ref,
              summary: $summary,
              domains: $domains,
              refs: [$primary_ref],
              evidence_pointers: [$primary_ref]
            }' > /tmp/observation.json
          PYTHONPATH="$SOURCE_PYTHONPATH" python -m compound.append_observation \
            --repo-root "$PWD" \
            --file /tmp/observation.json
          echo "FORCE_SYNTH=$FORCE_SYNTH" >> "$GITHUB_ENV"
          echo "EVENT_HINT=$EVENT_TYPE" >> "$GITHUB_ENV"

      - name: Synthesize domain docs
        working-directory: knowledge
        shell: bash
        run: |
          set -euo pipefail
          SOURCE_PYTHONPATH="${GITHUB_WORKSPACE}/source/scripts"
          EXTRA=()
          if [ "${FORCE_SYNTH:-false}" = "true" ]; then
            EXTRA+=(--force)
          fi
          PYTHONPATH="$SOURCE_PYTHONPATH" python -m compound.synthesize \
            --repo-root "$PWD" \
            --event-hint "${EVENT_HINT:-manual}" \
            "${EXTRA[@]}"
          PYTHONPATH="$SOURCE_PYTHONPATH" python -m compound.sync_agent_packs --repo-root "$PWD"
          PYTHONPATH="$SOURCE_PYTHONPATH" python -m compound.standing_brief --repo-root "$PWD"

      - name: Commit and push knowledge branch
        working-directory: knowledge
        env:
          GITHUB_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/compound .cursor/rules/architecture-expert.mdc .cursor/rules/architecture-expert-query.mdc .openhands/microagents/architecture_expert.md
          if git diff --cached --quiet; then
            echo "No compound doc changes to commit"
            exit 0
          fi
          git commit -m "chore(compound): synthesize architecture memory"
          PUSH_URL="https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          if ! git push "$PUSH_URL" HEAD:knowledge/architecture-expert; then
            PYTHONPATH="${GITHUB_WORKSPACE}/source/scripts" python -m compound.append_observation \
              --repo-root "$PWD" \
              --record-push-conflict || true
            echo "Push to knowledge branch failed; recorded conflict for hybrid backup"
            exit 1
          fi
          # Intentionally never merges into main (human promotion only).
