name: Architecture Compound

# Observe PRs/merges and synthesize docs/compound onto knowledge/architecture-expert.
# Never auto-merges to main. Emitters append; synthesize alone rewrites canon docs.

"on":
  pull_request:
    types: [opened, synchronize, reopened, labeled, closed]
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_synthesize:
        description: Force synthesize even for dependency-bot-only batches
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

concurrency:
  group: architecture-compound-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  synthesize:
    name: Synthesize knowledge branch
    runs-on: ubuntu-latest
    # Skip non-merged PR close events (only merged closes promote to landed).
    if: >
      github.event_name != 'pull_request' ||
      github.event.action != 'closed' ||
      github.event.pull_request.merged == true
    permissions:
      contents: write
      pull-requests: read
    env:
      COMPOUND_APPEND_OBSERVATION: scripts/compound/append_observation.py
    steps:
      - name: Checkout knowledge branch
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: knowledge/architecture-expert
          fetch-depth: 0
        continue-on-error: true

      - name: Ensure knowledge branch exists
        shell: bash
        run: |
          set -euo pipefail
          if ! git rev-parse --verify HEAD >/dev/null 2>&1; then
            git fetch origin main
            git checkout -B knowledge/architecture-expert origin/main
          fi

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Build and append observation
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ github.event.pull_request.title || '' }}
          PR_NUMBER: ${{ github.event.pull_request.number || '' }}
          PR_ACTION: ${{ github.event.action || '' }}
          PR_MERGED_JSON: ${{ toJson(github.event.pull_request.merged || false) }}
          EVENT_NAME: ${{ github.event_name }}
          FORCE_INPUT: ${{ github.event.inputs.force_synthesize || 'false' }}
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -f "$COMPOUND_APPEND_OBSERVATION" ]; then
            echo "Compound scripts are not available on this checkout; skipping"
            echo "COMPOUND_SKIP=true" >> "$GITHUB_ENV"
            exit 0
          fi
          FORCE_SYNTH="false"
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if [ "$PR_ACTION" = "closed" ] && [ "$PR_MERGED_JSON" = "true" ]; then
              STATUS="landed"
              EVENT_TYPE="pull_request.closed"
              FORCE_SYNTH="true"
            else
              STATUS="provisional"
              EVENT_TYPE="pull_request.${PR_ACTION}"
            fi
            PRIMARY_REF="pr:${PR_NUMBER}"
            SUMMARY=$(jq -rn --arg t "$PR_TITLE" '$t[:240]')
            FILES_JSON=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/files" --paginate -q '.[].filename' 2>/dev/null | jq -R -s -c 'split("\n")|map(select(length>0))' || echo '[]')
          elif [ "$EVENT_NAME" = "push" ]; then
            STATUS="landed"
            PRIMARY_REF="sha:${GITHUB_SHA}"
            SUMMARY="Merge/push to main ${GITHUB_SHA}"
            EVENT_TYPE="push.main"
            FORCE_SYNTH="true"
            FILES_JSON=$(jq -c '[((.commits // [])[] | (.modified // [])[], (.added // [])[], (.removed // [])[])] | unique | map(select(. != null and . != ""))' "$GITHUB_EVENT_PATH" 2>/dev/null || echo '[]')
          else
            STATUS="landed"
            PRIMARY_REF="manual:${GITHUB_RUN_ID}"
            SUMMARY="Manual compound workflow_dispatch"
            EVENT_TYPE="workflow_dispatch"
            FORCE_SYNTH="true"
            FILES_JSON='[]'
          fi
          if [ "$FORCE_INPUT" = "true" ]; then
            FORCE_SYNTH="true"
          fi
          DOMAINS_JSON=$(FILES_JSON="$FILES_JSON" python -c 'import json,os,sys; sys.path.insert(0,"scripts"); from compound.schema import detect_domains_from_paths; print(json.dumps(list(detect_domains_from_paths(json.loads(os.environ["FILES_JSON"])))))')
          OBSERVATION_FILE="$PWD/.compound-observation.json"
          trap 'rm -f "$OBSERVATION_FILE"' EXIT
          jq -n \
            --arg id "gh-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}" \
            --arg source "github" \
            --arg event_type "$EVENT_TYPE" \
            --arg status "$STATUS" \
            --arg primary_ref "$PRIMARY_REF" \
            --arg summary "$SUMMARY" \
            --argjson domains "$DOMAINS_JSON" \
            '{
              observation_id: $id,
              source: $source,
              event_type: $event_type,
              status: $status,
              primary_ref: $primary_ref,
              summary: $summary,
              domains: $domains,
              refs: [$primary_ref],
              evidence_pointers: [$primary_ref]
            }' > "$OBSERVATION_FILE"
          python "$COMPOUND_APPEND_OBSERVATION" --file "$OBSERVATION_FILE"
          echo "FORCE_SYNTH=$FORCE_SYNTH" >> "$GITHUB_ENV"
          echo "EVENT_HINT=$EVENT_TYPE" >> "$GITHUB_ENV"

      - name: Synthesize domain docs
        if: env.COMPOUND_SKIP != 'true'
        shell: bash
        run: |
          set -euo pipefail
          EXTRA=()
          if [ "${FORCE_SYNTH:-false}" = "true" ]; then
            EXTRA+=(--force)
          fi
          python scripts/compound/synthesize.py --event-hint "${EVENT_HINT:-manual}" "${EXTRA[@]}"
          python scripts/compound/sync_agent_packs.py
          python scripts/compound/standing_brief.py

      - name: Commit and push knowledge branch
        if: env.COMPOUND_SKIP != 'true'
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/compound .cursor/rules/architecture-expert.mdc .cursor/rules/architecture-expert-query.mdc .openhands/microagents/architecture_expert.md
          if git diff --cached --quiet; then
            echo "No compound doc changes to commit"
            exit 0
          fi
          git commit -m "chore(compound): synthesize architecture memory"
          if ! git push origin HEAD:knowledge/architecture-expert; then
            python "$COMPOUND_APPEND_OBSERVATION" --record-push-conflict || true
            echo "Push to knowledge branch failed; recorded conflict for hybrid backup"
            exit 1
          fi
          # Intentionally never merges into main (human promotion only).
