# Debricked SCA workflow: scans for dependency vulnerabilities on push, PR, and manual dispatch.
name: Debricked scan

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
  workflow_dispatch:

jobs:
  vulnerabilities-scan:
    name: Vulnerability Scan
    if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.fork == false
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      security-events: write
      actions: read
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2 - pinned SHA for supply-chain security

      - name: Run Debricked Scan
        uses: debricked/actions/docker-scan@659ae7accc12313772fbfbd1b1fccec31772ce41 # v4 - pinned SHA for supply-chain security
        env:
          DEBRICKED_TOKEN: ${{ secrets.DEBRICKED_TOKEN }}
