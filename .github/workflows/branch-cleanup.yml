name: Branch Cleanup

"on":
  schedule:
    # Run weekly on Sundays at 00:00 UTC
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run mode (only report, do not delete)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Delete merged branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete merged branches (excluding protected branches)
          EXCLUDE="main|develop|staging|production"
          DRY_RUN="${{ github.event.inputs.dry_run || 'false' }}"
          git fetch --prune
          for branch in $(git branch -r --merged origin/main | grep -v "origin/HEAD\|origin/main" | sed 's|origin/||'); do
            if echo "$branch" | grep -qE "^($EXCLUDE)$"; then
              echo "Skipping protected branch: $branch"
              continue
            fi
            if [ "$DRY_RUN" = "true" ]; then
              echo "[DRY RUN] Would delete: $branch"
            else
              echo "Deleting merged branch: $branch"
              git push origin --delete "$branch" || echo "Failed to delete $branch (may already be gone)"
            fi
          done

      - name: Report stale branches
        run: |
          echo "## Stale Branches Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          git for-each-ref --sort=-committerdate refs/remotes/origin/ --format='%(refname:short)|%(committerdate:relative)|%(authorname)' | \
            grep -v 'origin/main\|origin/HEAD' | \
            awk -F'|' '{printf "- **%s** - Last commit: %s by %s\n", $1, $2, $3}' >> $GITHUB_STEP_SUMMARY
