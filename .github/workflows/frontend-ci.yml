name: Frontend CI

on:
  push:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - 'api/api_models.py'
      - 'frontend/app/types/api.ts'
      - 'frontend/__tests__/lib/api-contract-seams.test.ts'
      - '.github/workflows/frontend-ci.yml'
      - '.github/actions/ci-common/**'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'frontend/**'
      - 'api/api_models.py'
      - 'frontend/app/types/api.ts'
      - 'frontend/__tests__/lib/api-contract-seams.test.ts'
      - '.github/workflows/frontend-ci.yml'
      - '.github/actions/ci-common/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run frontend CI common
        uses: ./.github/actions/ci-common
        with:
          language: node
          node-version: '22'
          working-directory: frontend
          dependency-paths: frontend/package-lock.json
          install: npm ci
          test: |
            npm run lint
            npm run test:coverage -- --ci
          build: npm run build

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1

        with:
          name: frontend-test-results
          path: frontend/junit.xml
          if-no-files-found: warn
