# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# A sample workflow which sets up Snyk to analyze the full Snyk platform (Snyk Open Source, Snyk Code,
# Snyk Container and Snyk Infrastructure as Code)
# The setup installs the Snyk CLI - for more details on the possible commands
# check https://docs.snyk.io/snyk-cli/cli-reference
# The results of Snyk Code are then uploaded to GitHub Security Code Scanning
#
# In order to use the Snyk Action you will need to have a Snyk API token.
# More details in https://github.com/snyk/actions#getting-your-snyk-token
# or you can signup for free at https://snyk.io/login
#
# For more examples, including how to limit scans to only high-severity issues
# and fail PR checks, see https://github.com/snyk/actions/

name: Snyk Security

"on":
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: '0 8 * * 1'  # Run weekly on Mondays at 8 AM UTC

permissions:
  contents: read

jobs:
  snyk:
    permissions:
      contents: read # for actions/checkout to fetch code
      security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
      actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Check Snyk token availability
        id: snyk-token
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: |
          if [ -n "$SNYK_TOKEN" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Skip Snyk when token is unavailable
        if: ${{ steps.snyk-token.outputs.available == 'false' }}
        run: echo "Skipping Snyk scans because SNYK_TOKEN is not available."
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        if: ${{ steps.snyk-token.outputs.available == 'true' }}
      - name: Set up Snyk CLI to check for security issues
        if: ${{ steps.snyk-token.outputs.available == 'true' }}
        # Snyk can be used to break the build when it detects security issues.
        # In this case we want to upload the SAST issues to GitHub Code Scanning
        uses: snyk/actions/setup@8e119fbb6c251787721d34ba683ed48eba792766

        # For Snyk Open Source you must first set up the development environment for your application's dependencies
        # For example for Node
        #- uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        #    node-version: 20

        # Runs Snyk Code (SAST) analysis and uploads result into GitHub.
        # Code review scans are quota-limited - use continue-on-error for graceful degradation
      - name: Snyk Code test
        if: ${{ steps.snyk-token.outputs.available == 'true' }}
        run: snyk code test --sarif > snyk-code.sarif
        continue-on-error: true  # Quota-limited scan
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

        # Runs Snyk Open Source (SCA) analysis and uploads result to Snyk.
      - name: Snyk Open Source monitor
        if: ${{ steps.snyk-token.outputs.available == 'true' }}
        run: snyk monitor --all-projects
        continue-on-error: true  # May fail if no supported manifests found
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

        # Runs Snyk Infrastructure as Code (IaC) analysis and uploads result to Snyk.
      - name: Snyk IaC test and report
        if: ${{ steps.snyk-token.outputs.available == 'true' }}
        run: snyk iac test --report
        continue-on-error: true  # May fail if no IaC files present
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

        # - name: Build the Docker image
        #   run: docker build -t your/image-to-test .
        # - name: Snyk Container monitor
        #   run: snyk container monitor your/image-to-test --file=Dockerfile
        #   env:
        #     SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

        # hashFiles() is truthy for zero-byte files; require non-empty content before upload.
      - name: Check SARIF output
        id: sarif
        if: ${{ always() && steps.snyk-token.outputs.available == 'true' }}
        run: |
          if [ -s snyk-code.sarif ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

        # Push the Snyk Code results into GitHub Code Scanning tab
      - name: Upload result to GitHub Code Scanning
        if: ${{ always() && steps.snyk-token.outputs.available == 'true' && steps.sarif.outputs.present == 'true' }}
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: snyk-code.sarif
