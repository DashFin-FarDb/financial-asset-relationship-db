# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow integrates Pyre with GitHub's
# Code Scanning feature.
#
# Pyre is a performant type checker for Python compliant with
# PEP 484. Pyre can analyze codebases with millions of lines
# of code incrementally – providing instantaneous feedback
# to developers as they write code.
#
# See https://pyre-check.org
#
# Note: facebook/pyre-action is avoided because its nested actions
# are not full-length SHA pins and fail org action-pinning policy.

name: Pyre

"on":
  workflow_dispatch:
  push:
    branches: [ "main", "Default" ]
    paths:
      - '**/*.py'
      - 'requirements*.txt'
      - '.github/workflows/pyre.yml'
      - '!**/*.md'
      - '!docs/**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ "main" ]
    paths:
      - '**/*.py'
      - 'requirements*.txt'
      - '.github/workflows/pyre.yml'
      - '!**/*.md'
      - '!docs/**'

permissions:
    contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pyre:
    permissions:
      actions: read
      contents: read
      security-events: write
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install Pyre and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyre-check
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Ensure Pyre configuration
        run: |
          if [ ! -f .pyre_configuration ]; then
            printf '%s\n' '{' \
              '  "source_directories": ["."],' \
              '  "exclude": [".*/\\\\.venv/.*", ".*/node_modules/.*", ".*/frontend/.*", ".*/tests?/.*"]' \
              '}' > .pyre_configuration
          fi

      - name: Run Pyre
        # Repo is not fully typed; keep the job green while still publishing findings.
        id: pyre
        continue-on-error: true
        run: |
          # Match facebook/pyre-action SARIF emission so Code Scanning still receives results.
          set +e
          pyre --noninteractive --output=sarif check > pyre-results.sarif
          status=$?
          set -e
          # Write a valid empty SARIF if pyre produced non-JSON output.
          # Use a Python heredoc so shellcheck does not treat SARIF "$schema" as a shell var.
          python3 <<'PY'
          import json
          from pathlib import Path

          path = Path("pyre-results.sarif")
          try:
              json.loads(path.read_text(encoding="utf-8"))
          except (OSError, json.JSONDecodeError, ValueError):
              path.write_text(
                  json.dumps(
                      {
                          "version": "2.1.0",
                          "$schema": (
                              "https://raw.githubusercontent.com/oasis-tcs/"
                              "sarif-spec/master/Schemata/sarif-schema-2.1.0.json"
                          ),
                          "runs": [
                              {
                                  "tool": {
                                      "driver": {
                                          "name": "Pyre",
                                          "informationUri": "https://pyre-check.org",
                                          "rules": [],
                                      }
                                  },
                                  "results": [],
                                  "invocations": [{"executionSuccessful": True}],
                              }
                          ],
                      }
                  ),
                  encoding="utf-8",
              )
          PY
          exit "$status"

      - name: Upload Pyre SARIF artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: pyre-sarif-results
          path: pyre-results.sarif
          if-no-files-found: ignore

      - name: Upload Pyre SARIF to Code Scanning
        if: always()
        uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v4.36.3
        with:
          sarif_file: pyre-results.sarif
          category: pyre
