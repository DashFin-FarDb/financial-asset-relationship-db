# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow requires that you have an existing account with codescan.io
# For more information about configuring your workflow,
# read our documentation at https://github.com/codescan-io/codescan-scanner-action
name: CodeScan

"on":
  push:
    branches: [ "main", "Default" ]
  pull_request:
    types: [opened, synchronize, reopened]
    # The branches below must be a subset of the branches above
    branches: [ "main" ]
  schedule:
    - cron: '30 6 * * 0'

permissions:
  contents: read

jobs:
    CodeScan:
        permissions:
          contents: read # for actions/checkout to fetch code
          security-events: write # for github/codeql-action/upload-sarif to upload SARIF results
          actions: read # only required for a private repository by github/codeql-action/upload-sarif to get the Action run status
        runs-on: ubuntu-latest
        steps:
          - name: Checkout repository
            uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
          - name: Cache files
            uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
            with:
              path: ~/.sonar/cache
              key: ${{ runner.os }}-sonar-${{ hashFiles('**/pom.xml', '**/build.gradle*', '**/settings.gradle*') }}
              restore-keys: |
                ${{ runner.os }}-sonar-
          - name: Set up JDK 17
            id: setup-java
            uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
            with:
              java-version: '17'
              distribution: 'temurin'
          - name: Run Analysis
            uses: codescan-io/codescan-scanner-action@955d3d1b4a9e374064189719484005ce8e08a749
            env:
              JAVA_HOME: ${{ steps.setup-java.outputs.path }}
              PATH: ${{ steps.setup-java.outputs.path }}/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            with:
              login: ${{ secrets.CODESCAN_AUTH_TOKEN }}
              organization: ${{ secrets.CODESCAN_ORGANIZATION_KEY }}
              projectKey: ${{ secrets.CODESCAN_PROJECT_KEY }}
          - name: Upload SARIF file
            uses: github/codeql-action/upload-sarif@54f647b7e1bb85c95cddabcd46b0c578ec92bc1a # v3
            with:
              sarif_file: codescan.sarif
