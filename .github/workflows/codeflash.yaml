name: Codeflash

permissions:
  contents: read
  pull-requests: write

"on":
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      # So that this workflow only runs when code within the target module is modified
      - '**'
  workflow_dispatch:

concurrency:
  # Any new push to the PR will cancel the previous run, so that only the latest code is optimized
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true


jobs:
  optimize:
    name: Optimize new Python code
    # Don't run codeflash on codeflash-ai[bot] commits, prevent duplicate optimizations
    if: ${{ github.actor != 'codeflash-ai[bot]' }}
    runs-on: ubuntu-latest

    steps:
      - name: Check Codeflash API key availability
        id: codeflash-api-key
        env:
          CODEFLASH_API_KEY: ${{ secrets.CODEFLASH_API_KEY }}
        run: |
          if [ -n "$CODEFLASH_API_KEY" ]; then
            echo "available=true" >> "$GITHUB_OUTPUT"
          else
            echo "available=false" >> "$GITHUB_OUTPUT"
          fi
      - name: 🛎️ Checkout
        if: ${{ steps.codeflash-api-key.outputs.available == 'true' }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: 🐍 Set up Python
        if: ${{ steps.codeflash-api-key.outputs.available == 'true' }}
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.12'
      - name: Skip Codeflash when API key is unavailable
        if: ${{ steps.codeflash-api-key.outputs.available == 'false' }}
        run: echo "Skipping Codeflash because the API key is not available."
      - name: 📦 Install Dependencies
        if: ${{ steps.codeflash-api-key.outputs.available == 'true' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install codeflash
      - name: ⚡️Codeflash Optimization
        if: ${{ steps.codeflash-api-key.outputs.available == 'true' }}
        env:
          CODEFLASH_API_KEY: ${{ secrets.CODEFLASH_API_KEY }}
        run: codeflash
