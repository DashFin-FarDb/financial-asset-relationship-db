# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

# This workflow integrates Python Static Analyzer (Pysa) with
# GitHub's Code Scanning feature.
#
# Python Static Analyzer (Pysa) is a security-focused static
# analysis tool that tracks flows of data from where they
# originate to where they terminate in a dangerous location.
#
# See https://pyre-check.org/docs/pysa-basics/
#
# Note: facebook/pysa-action is avoided because its nested actions
# are not full-length SHA pins and fail org action-pinning policy.

name: Pysa

"on":
  workflow_dispatch:
  push:
    branches: [ "main", "Default" ]
    paths:
      - '**/*.py'
      - 'requirements*.txt'
      - '.github/workflows/pysa.yml'
      - '!**/*.md'
      - '!docs/**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ "main" ]
    paths:
      - '**/*.py'
      - 'requirements*.txt'
      - '.github/workflows/pysa.yml'
      - '!**/*.md'
      - '!docs/**'
  schedule:
    - cron: '22 11 * * 6'

permissions:
    contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pysa:
    permissions:
      actions: read
      contents: read
      security-events: write

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: '3.11'

      - name: Install Pysa and dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyre-check
          if [ -f requirements.txt ]; then
            python -m pip install -r requirements.txt
          fi

      - name: Ensure Pyre/Pysa configuration
        run: |
          if [ ! -f .pyre_configuration ]; then
            printf '%s\n' '{' \
              '  "source_directories": ["."],' \
              '  "taint_models_path": [],' \
              '  "exclude": [".*/\\\\.venv/.*", ".*/node_modules/.*", ".*/frontend/.*", ".*/tests?/.*"]' \
              '}' > .pyre_configuration
          fi

      - name: Run Pysa
        # Template taint models are not checked in; keep the job green while
        # still validating that the analyzer installs and starts.
        continue-on-error: true
        run: pyre analyze --no-verify --save-results-to pysa-results
