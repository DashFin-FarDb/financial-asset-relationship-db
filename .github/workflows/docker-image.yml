name: Docker Image CI

permissions:
  contents: read

"on":
  push:
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
      - '**/Dockerfile'
      - '**/Dockerfile.*'
      - '**/*.dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
      - '**/docker-compose*.yml'
      - 'compose.yml'
      - 'compose.yaml'
      - 'docker/**'
      - '.github/workflows/docker-image.yml'
      - '!**/*.md'
      - '!docs/**'
  pull_request:
    types: [opened, synchronize, reopened]
    branches: [ "main" ]
    paths:
      - 'Dockerfile'
      - '**/Dockerfile'
      - '**/Dockerfile.*'
      - '**/*.dockerfile'
      - '.dockerignore'
      - 'docker-compose.yml'
      - '**/docker-compose*.yml'
      - 'compose.yml'
      - 'compose.yaml'
      - 'docker/**'
      - '.github/workflows/docker-image.yml'
      - '!**/*.md'
      - '!docs/**'

concurrency:
  group: docker-image-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
    - name: Build the Docker image
      run: docker build . --file Dockerfile --tag "my-image-name:$(date +%s)"
