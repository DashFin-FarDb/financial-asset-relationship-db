name: "CI Common"
description: "Shared steps for setting up Python/Node, caching, and running install/build/test"
inputs:
  language:
    description: "Runtime language: python or node"
    required: true
  python-version:
    description: "Python version to set up"
    required: false
  node-version:
    description: "Node.js version to set up"
    required: false
  working-directory:
    description: "Directory to run commands in"
    required: false
    default: "."
  install:
    description: "Install command"
    required: false
    default: ""
  build:
    description: "Build command"
    required: false
    default: ""
  test:
    description: "Test command"
    required: false
    default: ""
  dependency-paths:
    description: "Cache dependency paths (newline or comma-separated)"
    required: false
    default: ""
runs:
  using: "composite"
  steps:

    - name: Setup Python
      if: ${{ inputs.language == 'python' }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'
        cache-dependency-path: ${{ inputs.dependency-paths }}

    - name: Setup Node.js
      if: ${{ inputs.language == 'node' }}
      uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        cache-dependency-path: ${{ inputs.dependency-paths }}

    - name: Install dependencies
      if: ${{ inputs.install != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        # Write commands to a temporary script file to prevent injection
        SCRIPT_FILE="$(mktemp)"
        cat > "$SCRIPT_FILE" << 'EOF'
        ${{ inputs.install }}
        EOF
        # Trim whitespace and exit early if the script body is effectively empty
        if [[ -z "$(cat "$SCRIPT_FILE" | tr -d '[:space:]')" ]]; then
          rm -f "$SCRIPT_FILE"
          exit 0
        fi
        # Execute the script file with proper error handling
        bash -euo pipefail "$SCRIPT_FILE"
        EXIT_CODE=$?
        rm -f "$SCRIPT_FILE"
        exit $EXIT_CODE

    - name: Build
      if: ${{ inputs.build != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        # Write commands to a temporary script file to prevent injection
        SCRIPT_FILE="$(mktemp)"
        cat > "$SCRIPT_FILE" << 'EOF'
        ${{ inputs.build }}
        EOF
        # Trim whitespace and exit early if the script body is effectively empty
        if [[ -z "$(cat "$SCRIPT_FILE" | tr -d '[:space:]')" ]]; then
          rm -f "$SCRIPT_FILE"
          exit 0
        fi
        # Execute the script file with proper error handling
        bash -euo pipefail "$SCRIPT_FILE"
        EXIT_CODE=$?
        rm -f "$SCRIPT_FILE"
        exit $EXIT_CODE

    - name: Test
      if: ${{ inputs.test != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: |
        set -euo pipefail
        # Write commands to a temporary script file to prevent injection
        SCRIPT_FILE="$(mktemp)"
        cat > "$SCRIPT_FILE" << 'EOF'
        ${{ inputs.test }}
        EOF
        # Trim whitespace and exit early if the script body is effectively empty
        if [[ -z "$(cat "$SCRIPT_FILE" | tr -d '[:space:]')" ]]; then
          rm -f "$SCRIPT_FILE"
          exit 0
        fi
        # Execute the script file with proper error handling
        bash -euo pipefail "$SCRIPT_FILE"
        EXIT_CODE=$?
        rm -f "$SCRIPT_FILE"
        exit $EXIT_CODE
