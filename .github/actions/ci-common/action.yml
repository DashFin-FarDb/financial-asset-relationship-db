name: "CI Common"
description: "Shared steps for setting up Python/Node, caching, and running install/build/test"
inputs:
  language:
    description: "Runtime language: python or node"
    required: true
  python-version:
    description: "Python version to set up"
    required: false
  node-version:
    description: "Node.js version to set up"
    required: false
  working-directory:
    description: "Directory to run commands in"
    required: false
    default: "."
  install:
    description: "Install command"
    required: false
    default: ""
  build:
    description: "Build command"
    required: false
    default: ""
  test:
    description: "Test command"
    required: false
    default: ""
  dependency-paths:
    description: "Cache dependency paths (newline or comma-separated)"
    required: false
    default: ""
runs:
  using: "composite"
  steps:

    - name: Setup Python
      if: ${{ inputs.language == 'python' }}
      uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'
        cache-dependency-path: ${{ inputs.dependency-paths }}

    - name: Setup Node.js
      if: ${{ inputs.language == 'node' }}
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        cache-dependency-path: ${{ inputs.dependency-paths }}

    # Pass command inputs via env (not run: ${{ inputs.* }}) so GitHub does not
    # splice untrusted expressions into the shell script body (Semgrep GHA injection).
    # Write to a temp file and exec that file — avoids the fragile jq/JSON encode path
    # that previously exited 64 before any CI commands ran.
    - name: Install dependencies
      if: ${{ inputs.install != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        SCRIPT_CONTENT: ${{ inputs.install }}
      run: |
        set -euo pipefail
        SCRIPT_FILE="$(mktemp)"
        trap 'rm -f "$SCRIPT_FILE"' EXIT
        printf '%s\n' "$SCRIPT_CONTENT" > "$SCRIPT_FILE"
        if ! grep -q '[^[:space:]]' "$SCRIPT_FILE"; then
          exit 0
        fi
        bash -euo pipefail "$SCRIPT_FILE"

    - name: Build
      if: ${{ inputs.build != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        SCRIPT_CONTENT: ${{ inputs.build }}
      run: |
        set -euo pipefail
        SCRIPT_FILE="$(mktemp)"
        trap 'rm -f "$SCRIPT_FILE"' EXIT
        printf '%s\n' "$SCRIPT_CONTENT" > "$SCRIPT_FILE"
        if ! grep -q '[^[:space:]]' "$SCRIPT_FILE"; then
          exit 0
        fi
        bash -euo pipefail "$SCRIPT_FILE"

    - name: Test
      if: ${{ inputs.test != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        SCRIPT_CONTENT: ${{ inputs.test }}
      run: |
        set -euo pipefail
        SCRIPT_FILE="$(mktemp)"
        trap 'rm -f "$SCRIPT_FILE"' EXIT
        printf '%s\n' "$SCRIPT_CONTENT" > "$SCRIPT_FILE"
        if ! grep -q '[^[:space:]]' "$SCRIPT_FILE"; then
          exit 0
        fi
        bash -euo pipefail "$SCRIPT_FILE"
