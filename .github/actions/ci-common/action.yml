name: "CI Common"
description: "Shared steps for setting up Python/Node, caching, and running install/build/test"
inputs:
  language:
    description: "Runtime language: python or node"
    required: true
  python-version:
    description: "Python version to set up"
    required: false
  node-version:
    description: "Node.js version to set up"
    required: false
  working-directory:
    description: "Directory to run commands in"
    required: false
    default: "."
  install:
    description: "Install command"
    required: false
    default: ""
  build:
    description: "Build command"
    required: false
    default: ""
  test:
    description: "Test command"
    required: false
    default: ""
  dependency-paths:
    description: "Cache dependency paths (newline or comma-separated)"
    required: false
    default: ""
runs:
  using: "composite"
  steps:

    - name: Setup Python
      if: ${{ inputs.language == 'python' }}
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
      with:
        python-version: ${{ inputs.python-version }}
        cache: 'pip'
        cache-dependency-path: ${{ inputs.dependency-paths }}

    - name: Setup Node.js
      if: ${{ inputs.language == 'node' }}
      uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4
      with:
        node-version: ${{ inputs.node-version }}
        cache: 'npm'
        cache-dependency-path: ${{ inputs.dependency-paths }}

    - name: Install dependencies
      if: ${{ inputs.install != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        CI_COMMON_INSTALL_CMD: ${{ inputs.install }}
      run: |
        set -euo pipefail
        # Trim whitespace and exit early if the script body is effectively empty
        if [[ -z "${CI_COMMON_INSTALL_CMD//[[:space:]]/}" ]]; then
          exit 0
        fi
        # Execute the full install script body, preserving newlines and quoting
        bash -euo pipefail -c "$CI_COMMON_INSTALL_CMD"

    - name: Build
      if: ${{ inputs.build != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        CI_COMMON_BUILD_CMD: ${{ inputs.build }}
      run: |
        set -euo pipefail
        # Trim whitespace and exit early if the script body is effectively empty
        if [[ -z "${CI_COMMON_BUILD_CMD//[[:space:]]/}" ]]; then
          exit 0
        fi
        # Execute the full build script body, preserving newlines and quoting
        bash -euo pipefail -c "$CI_COMMON_BUILD_CMD"

    - name: Test
      if: ${{ inputs.test != '' }}
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        CI_COMMON_TEST_CMD: ${{ inputs.test }}
      run: |
        set -euo pipefail
        # Trim whitespace and exit early if the script body is effectively empty
        if [[ -z "${CI_COMMON_TEST_CMD//[[:space:]]/}" ]]; then
          exit 0
        fi
        # Execute the full test script body, preserving newlines and quoting
        bash -euo pipefail -c "$CI_COMMON_TEST_CMD"
