version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - ALLOWED_ORIGINS=http://localhost:3000
      - DATABASE_URL=${DATABASE_URL:-sqlite:////tmp/fardb.db}
      - SECRET_KEY=${SECRET_KEY:?Set SECRET_KEY (>=32 chars) for production compose}
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      api:
        condition: service_healthy
