groups:
  - name: fardb-recording-rules
    rules:
      - record: fardb:requests_per_second
        expr: |
          sum(rate(http_requests_total[5m]))

      - record: fardb:error_rate
        expr: |
          sum(rate(http_requests_total{status_group="5xx"}[5m]))
          /
          sum(rate(http_requests_total[5m]))

      - record: fardb:availability_5m
        expr: |
          1 - fardb:error_rate

      - record: fardb:http_p95_latency
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(http_request_duration_seconds_bucket[5m]))
            by (le)
          )

      - record: fardb:rebuild_p95_duration
        expr: |
          histogram_quantile(
            0.95,
            sum(rate(graph_rebuild_duration_seconds_bucket[5m]))
            by (le)
          )
