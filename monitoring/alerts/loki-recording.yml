groups:
  - name: loki-event-aggregations
    rules:
      - record: log_events_total
        expr: sum by (event, level) (count_over_time({app="financial-asset-relationship-db"} | json | __error__="" [1m]))

      - record: log_rebuild_failures_total
        expr: sum(count_over_time({app="financial-asset-relationship-db"} | json | event="graph_rebuild_failed" [1m]))

      - record: log_slo_breaches_total
        expr: sum by (slo_name) (count_over_time({app="financial-asset-relationship-db"} | json | event="slo_breach_detected" [1m]))

      - record: log_auth_failures_total
        expr: sum by (event) (count_over_time({app="financial-asset-relationship-db"} | json | event=~"auth_login_failure|auth_token_expired|auth_token_invalid" [1m]))

      - record: log_access_denied_total
        expr: sum by (event) (count_over_time({app="financial-asset-relationship-db"} | json | event=~"auth_access_denied|auth_user_disabled" [1m]))
