groups:
  - name: slo-alerts
    rules:
      - alert: SLOCriticalBreach
        expr: slo_compliance_status == 0
        for: 2m
        labels:
          severity: critical
          component: slo
        annotations:
          summary: "SLO Breach detected: {{ $labels.slo_name }}"
          description: "The SLO '{{ $labels.slo_name }}' is currently in a breached state according to the internal evaluator."

      # Multi-window burn rate alerts (Google SRE Standard)
      # Assuming 99% SLO over 30 days

      - alert: SLOErrorBudgetFastBurn
        expr: |
          (
            (sum(rate(http_requests_total{status_group=~"5.."}[1h])) or vector(0)) / (sum(rate(http_requests_total[1h])) or vector(1)) > (1 - 0.99) * 14.4
          )
          AND
          (
            (sum(rate(http_requests_total{status_group=~"5.."}[5m])) or vector(0)) / (sum(rate(http_requests_total[5m])) or vector(1)) > (1 - 0.99) * 14.4
          )
        labels:
          severity: critical
          component: slo
        annotations:
          summary: "High Error Budget Burn Rate (Fast)"
          description: "Error budget is being consumed at a rate that will exhaust the 30-day budget in ~2 days."

      - alert: SLOErrorBudgetSlowBurn
        expr: |
          (
            (sum(rate(http_requests_total{status_group=~"5.."}[6h])) or vector(0)) / (sum(rate(http_requests_total[6h])) or vector(1)) > (1 - 0.99) * 3
          )
          AND
          (
            (sum(rate(http_requests_total{status_group=~"5.."}[30m])) or vector(0)) / (sum(rate(http_requests_total[30m])) or vector(1)) > (1 - 0.99) * 3
          )
        labels:
          severity: warning
          component: slo
        annotations:
          summary: "Elevated Error Budget Burn Rate (Slow)"
          description: "Error budget is being consumed at a rate that will exhaust the 30-day budget in 10 days."
