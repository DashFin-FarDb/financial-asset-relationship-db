groups:
  - name: api-alerts
    rules:
      - alert: APIHighLatency
        expr: histogram_quantile(0.99, sum by (le, route, method) (rate(http_request_duration_seconds_bucket[5m]))) > 0.5
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "High API Latency detected on route {{ $labels.route }}"
          description: "The 99th percentile latency for {{ $labels.method }} {{ $labels.route }} is {{ $value | printf \"%.2f\" }}s, which exceeds the SLO threshold of 0.5s."

      - alert: APIHighErrorRate
        expr: |
          sum by (route, method) (rate(http_requests_total{status_group=~"5.."}[5m]))
          /
          sum by (route, method) (rate(http_requests_total[5m])) > 0.05
        for: 5m
        labels:
          severity: critical
          component: api
        annotations:
          summary: "Elevated API Error Rate on route {{ $labels.route }}"
          description: "Route {{ $labels.method }} {{ $labels.route }} is experiencing an error rate of {{ $value | printf \"%.2f%%\" }}. Threshold is 5%."

      - alert: APIHighInFlightRequests
        expr: sum(http_requests_in_flight) > 100
        for: 2m
        labels:
          severity: warning
          component: api
        annotations:
          summary: "High number of in-flight API requests"
          description: "There are currently {{ $value }} in-flight requests, which may indicate a bottleneck or resource starvation."
